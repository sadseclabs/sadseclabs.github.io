<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>404 // NOT FOUND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --void: #050505;
        --rust: #ff4d00;
      }

      body {
        background-color: var(--void);
        color: #f2f2f2;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .link-hover:hover {
        color: var(--rust);
        transition: color 0.3s ease;

          <svg
            width="45"
            height="45"
            viewBox="0 0 100 100"
            class="md:w-[50px] md:h-[50px]"
            fill="none"
          >
            <rect
              x="4"
              y="4"
              width="92"
              height="92"
              rx="4"
              stroke="#1c1c1e"
              stroke-width="8"
            />
            <rect x="22" y="25" width="6" height="50" rx="1" fill="#3f3f46" />
            <rect x="37" y="25" width="6" height="50" rx="1" fill="#71717a" />
            <rect x="48" y="15" width="10" height="70" rx="2" fill="#FF4D00" />

            <span

            >
            <span
              class="ml-2 text-[10px] md:text-xs font-bold text-[#FF4D00] mono tracking-[0.2em] md:tracking-[0.3em]"
              >[LABS]</span
            >
          </div>
        </div>
      </nav>
    </a>

    <!-- MAIN CONTENT -->
    <main class="flex-grow flex flex-col items-center justify-center p-6">
      <h1
        class="text-8xl md:text-9xl font-black text-[#FF4D00] tracking-tighter"
      >
        404
      </h1>
      <p
        class="text-sm mono tracking-[0.3em] text-zinc-500 uppercase mt-4 mb-10"
      >
        Resource not found
      </p>
      <a
        href="/"
        class="px-8 py-3 border border-zinc-700 text-zinc-300 hover:bg-zinc-900 transition-all uppercase text-xs tracking-widest mono"
        >Return Home</a
      >
    </main>

    <!-- FOOTER -->
    <footer class="w-full p-6 md:p-10 border-t border-[#1c1c1e] mt-auto">
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6"
      >
        <span class="text-[9px] mono tracking-[0.3em] text-zinc-700 uppercase"
          >&copy; 2026 SADSEC LABS</span
        >
        <div
          class="flex gap-8 text-[10px] mono tracking-[0.2em] text-zinc-500 uppercase"

          <a href="./about.html" class="link-hover">About</a>
          <a href="./products.html" class="link-hover">Products</a>
          <a href="./team.html" class="link-hover">Team</a>
          <a href="./contact.html" class="link-hover">Contact</a>
