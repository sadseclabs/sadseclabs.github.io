<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEAM | SADSEC LABS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --void: #050505;
        --rust: #ff4d00;
      }

      body {
        background-color: var(--void);
        color: #f2f2f2;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .link-hover:hover {
        color: var(--rust);
        transition: color 0.3s ease;
      }

      .headshot {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: #0d0d0e;
        border: 1px solid #1c1c1e;
        margin-bottom: 20px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>

  <body class="antialiased">
    <!-- HEADER -->
    <a href="./index.html" class="header-brand">
      <nav class="w-full p-6 md:p-10 flex-shrink-0">
        <div class="max-w-7xl mx-auto flex items-center gap-4 md:gap-5">
          <svg
            width="45"
            height="45"
            viewBox="0 0 100 100"
            class="md:w-[50px] md:h-[50px]"
            fill="none"
          >
            <rect
              x="4"
              y="4"
              width="92"
              height="92"
              rx="4"
              stroke="#1c1c1e"
              stroke-width="8"
            />
            <rect x="22" y="25" width="6" height="50" rx="1" fill="#3f3f46" />
            <rect x="37" y="25" width="6" height="50" rx="1" fill="#71717a" />
            <rect x="48" y="15" width="10" height="70" rx="2" fill="#FF4D00" />
            <rect x="63" y="25" width="6" height="50" rx="1" fill="#71717a" />
            <rect x="78" y="25" width="6" height="50" rx="1" fill="#3f3f46" />
          </svg>
          <div class="flex items-baseline">
            <span
              class="text-xl md:text-2xl font-black tracking-tighter uppercase"
              >SADSEC</span
            >
            <span
              class="ml-2 text-[10px] md:text-xs font-bold text-[#FF4D00] mono tracking-[0.2em] md:tracking-[0.3em]"
              >[LABS]</span
            >
          </div>
        </div>
      </nav>
    </a>

    <!-- MAIN CONTENT-->
    <main class="flex-grow flex items-center p-6">
      <div class="max-w-4xl mx-auto w-full">
        <h1
          class="text-[10px] mono tracking-[0.5em] text-zinc-600 uppercase mb-12"
        >
          // Co-Founders
        </h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
          <div class="flex flex-col items-start">
            <div class="headshot">
              <img
                src="assets/sam.jpg"
                alt=""
                class="w-full h-full object-cover"
              />
            </div>
            <h2 class="text-xl font-black uppercase tracking-tight">Sam</h2>
            <p
              class="text-[10px] mono text-[#FF4D00] uppercase tracking-widest mb-3"
            >
              Co-Founder
            </p>
            <p class="text-zinc-400 leading-relaxed text-sm max-w-xs">
              Self-taught Polymath
            </p>
          </div>
          <div class="flex flex-col items-start">
            <div class="headshot">
              <img
                src="assets/Abdulhafeez.jpg"
                alt=""
                class="w-full h-full object-cover"
              />
            </div>
            <h2 class="text-xl font-black uppercase tracking-tight">
              Abdulhafeez
            </h2>
            <p
              class="text-[10px] mono text-[#FF4D00] uppercase tracking-widest mb-3"
            >
              Co-Founder
            </p>
            <p class="text-zinc-400 leading-relaxed text-sm max-w-xs">
              Cybersecurity Engineer
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="w-full p-6 md:p-10 border-t border-[#1c1c1e] mt-auto">
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6"
      >
        <span class="text-[9px] mono tracking-[0.3em] text-zinc-700 uppercase"
          >&copy; 2026 SADSEC LABS</span
        >
        <div
          class="flex gap-8 text-[10px] mono tracking-[0.2em] text-zinc-500 uppercase"
        >
          <a href="./about.html" class="link-hover">About</a>
          <a href="./products.html" class="link-hover">Products</a>
          <a href="./team.html" class="link-hover text-[#FF4D00]">Team</a>
          <a href="./contact.html" class="link-hover">Contact</a>
          <a
            href="https://github.com/sadseclabs"
            target="_blank"
            class="link-hover"
            >GitHub</a
          >
          <a href="https://x.com/sadseclabs" target="_blank" class="link-hover"
            >X</a
          >
        </div>
      </div>
    </footer>
  </body>
</html>
